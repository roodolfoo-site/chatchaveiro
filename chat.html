<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Atendimento</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Segoe UI", Arial, sans-serif;
background:#efeae2;
}

/* container */

.chat-container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER FIXO */

.header{
background:#075E54;
color:white;
padding:10px;
display:flex;
align-items:center;
position:fixed;
top:0;
width:100%;
z-index:10;
}

/* avatar */

.avatar{
width:40px;
height:40px;
border-radius:50%;
overflow:hidden;
margin-right:10px;
position:relative;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.avatar::after{
content:"";
width:10px;
height:10px;
background:#25D366;
border-radius:50%;
position:absolute;
bottom:2px;
right:2px;
border:2px solid #075E54;
}

.name{
font-size:14px;
font-weight:600;
}

.status{
font-size:11px;
opacity:0.8;
}

/* CHAT */

.messages{
flex:1;
padding:70px 10px 80px;
overflow-y:auto;
background-image:url("whats-fundo.jpg");
background-size:280px;
}

/* MENSAGENS */

.msg{
max-width:80%;
padding:10px 14px;
margin-bottom:10px;
border-radius:10px;
font-size:14px;
line-height:1.4;
position:relative;
animation:fade 0.2s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(5px);}
to{opacity:1; transform:translateY(0);}
}

.bot{
background:white;
border-top-left-radius:0;
}

.user{
background:#d9fdd3;
margin-left:auto;
border-top-right-radius:0;
}

.time{
font-size:11px;
color:#667781;
text-align:right;
margin-top:4px;
}

/* INPUT FIXO */

.input-area{
position:fixed;
bottom:0;
width:100%;
display:flex;
padding:10px;
background:#f0f2f5;
}

input{
flex:1;
padding:12px 16px;
border-radius:20px;
border:1px solid #ddd;
font-size:16px;
outline:none;
}

/* BOTÃO ESTILO WHATS */

button{
margin-left:8px;
width:45px;
height:45px;
border-radius:50%;
background:#25D366;
border:none;
color:white;
font-size:18px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
}

button:hover{
background:#1ebe5d;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
<div class="avatar">
<img src="atendente.jpg">
</div>

<div>
<div class="name">Thais - Atendimento</div>
<div class="status">online agora</div>
</div>
</div>

<div id="messages" class="messages"></div>

<div class="input-area">
<input id="text" placeholder="Digite sua mensagem">
<button onclick="send()">➤</button>
</div>

</div>

<script>

function hora(){
const agora=new Date()
return agora.getHours().toString().padStart(2,"0")+":"+agora.getMinutes().toString().padStart(2,"0")
}

/* mensagem inicial */

window.onload=function(){

const messages=document.getElementById("messages")

const msg=document.createElement("div")
msg.className="msg bot"

msg.innerHTML="Olá 👋 Sou a Thais da central.<br><br>O que aconteceu com sua chave ou fechadura?<div class='time'>"+hora()+"</div>"

messages.appendChild(msg)
messages.scrollTop=messages.scrollHeight

}

/* enviar */

async function send(){

const input=document.getElementById("text")
const messages=document.getElementById("messages")

const texto=input.value.trim()
if(!texto) return

const user=document.createElement("div")
user.className="msg user"
user.innerHTML=texto+"<div class='time'>"+hora()+"</div>"

messages.appendChild(user)
messages.scrollTop=messages.scrollHeight

input.value=""

/* digitando */

const typing=document.createElement("div")
typing.className="msg bot"
typing.innerHTML="Digitando..."
messages.appendChild(typing)

const resposta=await fetch("/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ message:texto })
})

const data=await resposta.json()

typing.remove()

const bot=document.createElement("div")
bot.className="msg bot"
bot.innerHTML=data.reply+"<div class='time'>"+hora()+"</div>"

messages.appendChild(bot)
messages.scrollTop=messages.scrollHeight

}

/* ENTER */

document.addEventListener("DOMContentLoaded",function(){

const input=document.getElementById("text")

input.addEventListener("keypress",function(e){
if(e.key==="Enter") send()
})

})

</script>

</body>
</html>
